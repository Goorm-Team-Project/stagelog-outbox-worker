apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-worker
  namespace: stagelog
  labels:
    app: outbox-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbox-worker
  template:
    metadata:
      labels:
        app: outbox-worker
    spec:
      serviceAccountName: stagelog-outbox-worker-sa
      containers:
      - name: outbox-worker
        image: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-outbox-worker:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: stagelog-outbox-worker-env
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: config.settings
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 384Mi
