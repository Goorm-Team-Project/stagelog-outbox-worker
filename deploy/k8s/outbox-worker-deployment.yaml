apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-worker
  namespace: stagelog
  labels:
    app: outbox-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbox-worker
  template:
    metadata:
      labels:
        app: outbox-worker
    spec:
      serviceAccountName: stagelog-outbox-worker-sa
      containers:
      - name: outbox-worker
        image: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-outbox-worker:latest
        imagePullPolicy: Always
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: config.settings
        volumeMounts:
        - name: env-file
          mountPath: /app/.env
          subPath: .env
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 384Mi
      volumes:
      - name: env-file
        secret:
          secretName: stagelog-outbox-worker-env
          items:
          - key: .env
            path: .env
