apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stagelog-outbox-worker-env
  namespace: stagelog
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  target:
    name: stagelog-outbox-worker-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        .env: |
          SECRET_KEY={{ .SECRET_KEY }}
          DEBUG={{ .DEBUG }}
          DB_MODE={{ .DB_MODE }}
          DB_HOST={{ .DB_HOST }}
          DB_NAME_POSTS={{ .DB_NAME_POSTS }}
          DB_USER_POSTS={{ .DB_USER_POSTS }}
          DB_PASSWORD_POSTS={{ .DB_PASSWORD_POSTS }}
          DB_NAME_AUTH={{ .DB_NAME_AUTH }}
          DB_USER_AUTH={{ .DB_USER_AUTH }}
          DB_PASSWORD_AUTH={{ .DB_PASSWORD_AUTH }}
          DB_NAME_EVENTS={{ .DB_NAME_EVENTS }}
          DB_USER_EVENTS={{ .DB_USER_EVENTS }}
          DB_PASSWORD_EVENTS={{ .DB_PASSWORD_EVENTS }}
          DB_USE_SSL={{ .DB_USE_SSL }}
          DB_SSL_CA={{ .DB_SSL_CA }}
          AWS_REGION={{ .AWS_REGION }}
          NOTIFICATION_EVENT_BUS_NAME={{ .NOTIFICATION_EVENT_BUS_NAME }}
          OUTBOX_NOTIFICATION_AGGREGATE_TYPE={{ .OUTBOX_NOTIFICATION_AGGREGATE_TYPE }}
          OUTBOX_DATABASES={{ .OUTBOX_DATABASES }}
          OUTBOX_PUBLISH_BATCH_SIZE={{ .OUTBOX_PUBLISH_BATCH_SIZE }}
          OUTBOX_MAX_RETRIES={{ .OUTBOX_MAX_RETRIES }}
          OUTBOX_RETRY_BASE_DELAY_SECONDS={{ .OUTBOX_RETRY_BASE_DELAY_SECONDS }}
          OUTBOX_PUBLISH_INTERVAL_SECONDS={{ .OUTBOX_PUBLISH_INTERVAL_SECONDS }}
  data:
  - secretKey: SECRET_KEY
    remoteRef:
      key: /stagelog/dev/shared/SECRET_KEY
  - secretKey: DEBUG
    remoteRef:
      key: /stagelog/dev/shared/DEBUG
  - secretKey: DB_MODE
    remoteRef:
      key: /stagelog/dev/shared/DB_MODE
  - secretKey: DB_HOST
    remoteRef:
      key: /stagelog/dev/shared/DB_HOST
  - secretKey: DB_NAME_POSTS
    remoteRef:
      key: /stagelog/dev/posts/DB_NAME_POSTS
  - secretKey: DB_USER_POSTS
    remoteRef:
      key: /stagelog/dev/posts/DB_USER_POSTS
  - secretKey: DB_PASSWORD_POSTS
    remoteRef:
      key: /stagelog/dev/posts/DB_PASSWORD_POSTS
  - secretKey: DB_NAME_AUTH
    remoteRef:
      key: /stagelog/dev/auth/DB_NAME_AUTH
  - secretKey: DB_USER_AUTH
    remoteRef:
      key: /stagelog/dev/auth/DB_USER_AUTH
  - secretKey: DB_PASSWORD_AUTH
    remoteRef:
      key: /stagelog/dev/auth/DB_PASSWORD_AUTH
  - secretKey: DB_NAME_EVENTS
    remoteRef:
      key: /stagelog/dev/events/DB_NAME_EVENTS
  - secretKey: DB_USER_EVENTS
    remoteRef:
      key: /stagelog/dev/events/DB_USER_EVENTS
  - secretKey: DB_PASSWORD_EVENTS
    remoteRef:
      key: /stagelog/dev/events/DB_PASSWORD_EVENTS
  - secretKey: DB_USE_SSL
    remoteRef:
      key: /stagelog/dev/shared/DB_USE_SSL
  - secretKey: DB_SSL_CA
    remoteRef:
      key: /stagelog/dev/shared/DB_SSL_CA
  - secretKey: AWS_REGION
    remoteRef:
      key: /stagelog/dev/shared/AWS_REGION
  - secretKey: NOTIFICATION_EVENT_BUS_NAME
    remoteRef:
      key: /stagelog/dev/shared/NOTIFICATION_EVENT_BUS_NAME
  - secretKey: OUTBOX_NOTIFICATION_AGGREGATE_TYPE
    remoteRef:
      key: /stagelog/dev/shared/OUTBOX_NOTIFICATION_AGGREGATE_TYPE
  - secretKey: OUTBOX_DATABASES
    remoteRef:
      key: /stagelog/dev/outbox-worker/OUTBOX_DATABASES
  - secretKey: OUTBOX_PUBLISH_BATCH_SIZE
    remoteRef:
      key: /stagelog/dev/outbox-worker/OUTBOX_PUBLISH_BATCH_SIZE
  - secretKey: OUTBOX_MAX_RETRIES
    remoteRef:
      key: /stagelog/dev/outbox-worker/OUTBOX_MAX_RETRIES
  - secretKey: OUTBOX_RETRY_BASE_DELAY_SECONDS
    remoteRef:
      key: /stagelog/dev/outbox-worker/OUTBOX_RETRY_BASE_DELAY_SECONDS
  - secretKey: OUTBOX_PUBLISH_INTERVAL_SECONDS
    remoteRef:
      key: /stagelog/dev/outbox-worker/OUTBOX_PUBLISH_INTERVAL_SECONDS
